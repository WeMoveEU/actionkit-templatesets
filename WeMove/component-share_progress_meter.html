{% if page.goal %}

    <!-- Begin progress meter code.-->
    <div id="progress" class="ak-progress-meter"></div>

    <script type="text/ak-template" for="progress">
        [% with (progress) { %]
            [% if ( goal && total ) { %]
                [% progress.current = total.actions; %]
                {% cache_report "custom_field_from_page_or_campaign" with cache_key as key page.id as page_id "external_signature_count" as field_name %}
                {% remember custom_field_from_page_or_campaign as ext_sig_count %}
                {% cache_report "custom_field_from_page_or_campaign" with cache_key as key page.id as page_id "external_signature_extras" as field_name %}
                {% remember custom_field_from_page_or_campaign as ext_sig_extras %}
                [% progress.current = parseInt(progress.current) + {{ ext_sig_count|default:"0" }} + {{ ext_sig_extras|default:"0" }}; %]
                [% const refval = progress.current * 1.111; %]
                [% if ( refval > goal || goal == 1 ) { %]
                    [% const cutoffs = [ 100, 200, 500, 1000, 2000, 5000, 10000, 25000, 50000, 75000, 100000, 125000, 150000, 175000, 200000, 250000, 300000, 350000, 400000, 450000 ]; %]
                    [% goal = ( Math.round( refval / 100000 ) + 1 ) * 100000; %]
                    [% for (const cutoff of cutoffs) { %]
                      [% if ( cutoff > refval ) { %]
                          [% goal = cutoff; %]
                          [% break; %]
                      [% } %]
                    [% } %]
                [% } %]
                [% progress.percent = parseInt(progress.current/goal*100); %]

                [% const display_percent = progress.current > goal ? 100 : progress.percent; %]
                <div class="rounded-md bg-wm-lightblue-box p-4 font-libre-franklin mb-2 text-wm-purple">
                    <div class="flex items-center gap-4">
                        <!-- Icon badge -->
                        <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-white">
                        <svg class="h-6 w-6 text-wm-bg-form" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm8 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM2 19a7 7 0 0 1 14 0v1H2v-1Zm15-1c0-1.46-.4-2.82-1.1-4H17a5 5 0 0 1 5 5v1h-5v-2Z"/>
                        </svg>
                        </div>

                        <!-- Numbers -->
                        <div class="flex items-center gap-4">
                        <span class="font-gilroy text-3xl font-extrabold leading-none text-wm-purple ml-2">[%= display_percent %]%</span>
                        <span class="text-sm text-left leading-tight text-wm-form-text ml-2">
                            <strong>[%= add_commas(progress.current) %]</strong> {% filter ak_text:"form_signatures_of" %}of{% endfilter %} [%= add_commas(goal) %]<br/>[%= progress.current != 1 ? '{% filter ak_text:"form_signaturesPlural" %}signatures{% endfilter %}' : '{% filter ak_text:"form_signaturesSingular" %}signature{% endfilter %}' %]
                        </span>
                        </div>
                    </div>

                    <!-- Bar -->
                    <div
                        class="mt-4 h-2.5 w-full overflow-hidden rounded-full bg-white"
                        role="progressbar"
                        aria-valuenow="[%= display_percent %]"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        aria-label="Signature progress">
                        <div class="h-full rounded-full bg-wm-bg-form transition-all ease-in-out" style="width: [%= display_percent %]%"></div>
                    </div>
                </div>
            [% } %]
        [% } %]
    </script>

    <input type="hidden" name="want_progress" value="1">
    <!-- End progress meter code -->

{% endif %}
